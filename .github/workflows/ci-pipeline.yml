name: CI Pipeline

on:
  push:
    branches:
      - "**"
  pull_request:
    branches:
      - "main"
  workflow_dispatch:

permissions:
  contents: read
  actions: write
  statuses: write
  checks: write


jobs:
  detect-changes:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.collect.outputs.matrix }}
      has_services: ${{ steps.collect.outputs.has_services }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Detect changed Maven modules
        id: collect
        shell: bash
        run: |
          set -euo pipefail

          mapfile -t reactor_modules < <(
            sed -n 's:.*<module>\(.*\)</module>.*:\1:p' pom.xml |
              sed 's/^\s*//; s/\s*$//' |
              grep -v '^$'
          )

          if [[ "${GITHUB_EVENT_NAME}" == "pull_request" ]]; then
            base_sha="${{ github.event.pull_request.base.sha }}"
            head_sha="${{ github.event.pull_request.head.sha }}"
          else
            base_sha="${{ github.event.before }}"
            head_sha="${{ github.sha }}"
          fi

          if [[ -z "$base_sha" || "$base_sha" == "0000000000000000000000000000000000000000" ]]; then
            base_sha="$(git rev-list --max-parents=0 HEAD | tail -n 1)"
          fi

          changed_files="$(git diff --name-only "$base_sha" "$head_sha" || true)"
          build_all=false
          reasons=()

          if [[ -z "$changed_files" ]]; then
            echo 'matrix={"include":[]}' >> "$GITHUB_OUTPUT"
            echo 'has_services=false' >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "Changed files between $base_sha..$head_sha:" >&2
          printf '%s\n' "$changed_files" >&2

          if printf '%s\n' "$changed_files" | grep -qx 'pom.xml'; then
            build_all=true
            reasons+=("root pom.xml changed")
          fi

          # If shared build config changes, run CI for all modules.
          # This keeps CI behavior predictable and is a good base for later tasks.
          if printf '%s\n' "$changed_files" | grep -Eq '^(\.github/|checkstyle/)'; then
            build_all=true
            reasons+=("shared build config changed (.github/ or checkstyle/)")
          fi

          mapfile -t top_level_dirs < <(
            printf '%s\n' "$changed_files" |
              awk -F/ 'NF > 1 {print $1}' |
              sort -u
          )

          declare -a services=()

          for top_level_dir in "${top_level_dirs[@]}"; do
            if [[ "$top_level_dir" == "common-library" ]]; then
              build_all=true
              reasons+=("common-library changed")
            elif [[ -f "$top_level_dir/pom.xml" ]]; then
              if printf '%s\n' "${reactor_modules[@]}" | grep -qx "$top_level_dir"; then
                services+=("$top_level_dir")
              fi
            fi
          done

          if [[ "$build_all" == "true" ]]; then
            services=("${reactor_modules[@]}")
          fi

          if [[ "$build_all" == "true" ]]; then
            echo "build_all=true (reasons: ${reasons[*]:-n/a})" >&2
          else
            echo "build_all=false (selected services derived from changed folders)" >&2
          fi

          echo "Selected services (${#services[@]}): ${services[*]}" >&2

          if [[ ${#services[@]} -eq 0 ]]; then
            echo 'matrix={"include":[]}' >> "$GITHUB_OUTPUT"
            echo 'has_services=false' >> "$GITHUB_OUTPUT"
            exit 0
          fi

          matrix_json='{"include":['
          for index in "${!services[@]}"; do
            if [[ "$index" -gt 0 ]]; then
              matrix_json+=','
            fi
            matrix_json+='{"service":"'"${services[$index]}"'"}'
          done
          matrix_json+=']}'

          echo "matrix=$matrix_json" >> "$GITHUB_OUTPUT"
          echo 'has_services=true' >> "$GITHUB_OUTPUT"

  test:
    needs: detect-changes
    if: needs.detect-changes.outputs.has_services == 'true'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.detect-changes.outputs.matrix) }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Java 25
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '25'
          cache: maven

      - name: Run tests for ${{ matrix.service }}
        shell: bash
        run: |
          set -euo pipefail
          for attempt in 1 2 3; do
            echo "Attempt $attempt: mvn test (${{ matrix.service }})"
            if mvn -B -ntp -pl ${{ matrix.service }} -am test; then
              exit 0
            fi
            sleep $((attempt * 10))
          done
          echo "Maven test failed after retries."
          exit 1

      - name: Generate JaCoCo report for ${{ matrix.service }}
        shell: bash
        run: |
          set -euo pipefail
          for attempt in 1 2 3; do
            echo "Attempt $attempt: mvn jacoco:report (${{ matrix.service }})"
            if mvn -B -ntp -pl ${{ matrix.service }} jacoco:report; then
              exit 0
            fi
            sleep $((attempt * 10))
          done
          echo "JaCoCo report generation failed after retries."
          exit 1

      - name: Enforce coverage threshold (70%) for ${{ matrix.service }}
        env:
          SERVICE: ${{ matrix.service }}
          COVERAGE_THRESHOLD: '0.70'
        shell: bash
        run: |
          set -euo pipefail
          python3 - <<'PY'
          import os
          import sys
          import xml.etree.ElementTree as ET
          from pathlib import Path

          service = os.environ['SERVICE']
          threshold = float(os.environ.get('COVERAGE_THRESHOLD', '0.70'))
          report_path = Path(service) / 'target' / 'site' / 'jacoco' / 'jacoco.xml'

          if not report_path.exists():
            print(f"ERROR: Missing JaCoCo XML report: {report_path}")
            sys.exit(1)

          root = ET.parse(report_path).getroot()
          line_counter = None
          for counter in root.findall('counter'):
            if counter.get('type') == 'LINE':
              line_counter = counter
              break

          if line_counter is None:
            print("ERROR: No LINE counter found in JaCoCo XML.")
            sys.exit(1)

          missed = int(line_counter.get('missed', '0'))
          covered = int(line_counter.get('covered', '0'))
          total = missed + covered
          ratio = (covered / total) if total else 0.0

          print(f"Coverage (LINE) for {service}: {covered}/{total} = {ratio:.2%}")
          print(f"Threshold: {threshold:.2%}")

          if ratio + 1e-12 < threshold:
            print("ERROR: Coverage below threshold.")
            sys.exit(1)
          PY

      - name: Upload JaCoCo coverage report for ${{ matrix.service }}
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-${{ matrix.service }}
          path: |
            ${{ matrix.service }}/target/site/jacoco/jacoco.xml
            ${{ matrix.service }}/target/site/jacoco/index.html
            ${{ matrix.service }}/target/site/jacoco/jacoco.csv
          if-no-files-found: warn

      - name: Upload test results for ${{ matrix.service }}
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-${{ matrix.service }}
          path: |
            ${{ matrix.service }}/target/surefire-reports/*.xml
            ${{ matrix.service }}/target/failsafe-reports/*.xml
          if-no-files-found: ignore

  build:
    needs: [detect-changes, test]
    if: needs.detect-changes.outputs.has_services == 'true'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.detect-changes.outputs.matrix) }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Java 25
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '25'
          cache: maven

      - name: Build ${{ matrix.service }}
        shell: bash
        run: |
          set -euo pipefail
          for attempt in 1 2 3; do
            echo "Attempt $attempt: mvn package (${{ matrix.service }})"
            if mvn -B -ntp -pl ${{ matrix.service }} -am -DskipTests package; then
              exit 0
            fi
            sleep $((attempt * 10))
          done
          echo "Maven build failed after retries."
          exit 1

      - name: Upload build artifact for ${{ matrix.service }}
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-${{ matrix.service }}
          path: |
            ${{ matrix.service }}/target/*.jar
            ${{ matrix.service }}/target/*.war
            !${{ matrix.service }}/target/*.jar.original
            !${{ matrix.service }}/target/*-tests.jar
          if-no-files-found: warn

  test-summary:
    name: Test Summary
    needs: [detect-changes, test]
    if: always() && needs.detect-changes.outputs.has_services == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Download test result artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: test-results-*
          path: artifacts/test-results
          merge-multiple: true

      - name: Publish JUnit test report
        uses: dorny/test-reporter@v1
        with:
          name: Unit Tests
          path: artifacts/test-results/**/*.xml
          reporter: java-junit
          fail-on-error: 'false'

  ci-gate:
    name: CI Gate
    runs-on: ubuntu-latest
    needs: [detect-changes, test, build, test-summary]
    if: always()
    steps:
      - name: Evaluate results
        id: gate
        shell: bash
        run: |
          set -euo pipefail

          if [[ "${{ needs.detect-changes.outputs.has_services }}" != "true" ]]; then
            echo "No Maven module changes detected; passing."
            echo "state=success" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "test result: ${{ needs.test.result }}"
          echo "build result: ${{ needs.build.result }}"

          if [[ "${{ needs.test.result }}" != "success" || "${{ needs.build.result }}" != "success" ]]; then
            echo "state=failure" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "state=success" >> "$GITHUB_OUTPUT"

      - name: Publish CI Gate status
        uses: actions/github-script@v7
        with:
          script: |
            const state = '${{ steps.gate.outputs.state }}' || 'failure';
            await github.rest.repos.createCommitStatus({
              owner: context.repo.owner,
              repo: context.repo.repo,
              sha: context.sha,
              state,
              context: 'CI Gate',
              description: state === 'success' ? 'CI Gate passed' : 'CI Gate failed',
              target_url: `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`
            });

      - name: Fail if gate failed
        if: steps.gate.outputs.state != 'success'
        run: exit 1